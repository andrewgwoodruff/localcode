name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Set version
        id: version
        run: echo "version=0.$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        run: gh release create "v${{ steps.version.outputs.version }}" --title "v${{ steps.version.outputs.version }}" --notes "Built from ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload
        run: ./packages/opencode/script/build.ts
        env:
          LOCALCODE_VERSION: ${{ steps.version.outputs.version }}
          LOCALCODE_CHANNEL: latest
          LOCALCODE_RELEASE: "true"
          GH_REPO: andrewgwoodruff/localcode
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
